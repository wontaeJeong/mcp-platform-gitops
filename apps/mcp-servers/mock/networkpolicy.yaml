apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: mock-mcp-server-ingress
  annotations:
    argocd.argoproj.io/sync-wave: "50"
spec:
  podSelector:
    matchLabels:
      app: mock-mcp-server
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: mcp-auth-gateway
      ports:
        - protocol: TCP
          port: 8080
