apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: mcp-gateway

resources:
  - configmap.yaml
  - deployment.yaml
  - service.yaml
  - ingress.yaml

# CI replaces newTag with the Git commit SHA on each build.
images:
  - name: cr.aidev.samsungds.net/mcp/mcp-auth-gateway
    newTag: REPLACE_WITH_GIT_SHA
