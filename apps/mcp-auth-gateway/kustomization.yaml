apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: mcp-gateway

resources:
  - deployment.yaml
  - service.yaml
  - ingress.yaml
  - pdb.yaml

# configmap.yaml holds the raw app config (not a Kind: ConfigMap manifest).
# The generated ConfigMap gets a content-hash suffix, and kustomize rewrites
# the Deployment's volume reference to match - so pods roll automatically
# whenever this config changes. No manual checksum annotation needed.
configMapGenerator:
  - name: mcp-auth-gateway-config
    files:
      - config.yaml=configmap.yaml

# CI replaces newTag with the Git commit SHA on each build.
images:
  - name: cr.aidev.samsungds.net/mcp-platform/mcp-auth-gateway
    newTag: REPLACE_WITH_GIT_SHA
