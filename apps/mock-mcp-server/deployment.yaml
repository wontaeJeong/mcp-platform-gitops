apiVersion: apps/v1
kind: Deployment
metadata:
  name: mock-mcp-server
  labels:
    app: mock-mcp-server
  annotations:
    argocd.argoproj.io/sync-wave: "50"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mock-mcp-server
  template:
    metadata:
      labels:
        app: mock-mcp-server
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: mock-mcp-server
          # Image tag is overridden per commit SHA via kustomization.yaml (images:).
          image: cr.aidev.samsungds.net/mcp-platform/mock-mcp-server
          env:
            # VERIFIES the internal X-MCP-Identity JWT signed by the gateway
            # using the SAME shared secret. Names must match mock-mcp-server's
            # Settings.from_env() (see mock-mcp-server/src/mock_mcp_server/settings.py).
            - name: MCP_IDENTITY_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: mcp-internal-signing
                  key: jwt-secret
            - name: MCP_IDENTITY_ISSUER
              value: "mcp-auth-gateway"
            - name: MCP_IDENTITY_AUDIENCE
              value: "mock-mcp-server"
            - name: MCP_IDENTITY_ALGORITHM
              value: "HS256"
          ports:
            - name: http
              containerPort: 8080
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 15
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              memory: 256Mi
