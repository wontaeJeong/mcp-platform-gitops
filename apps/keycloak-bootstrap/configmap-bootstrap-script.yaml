apiVersion: v1
kind: ConfigMap
metadata:
  name: keycloak-bootstrap-script
  annotations:
    argocd.argoproj.io/sync-wave: "30"
data:
  bootstrap.sh: |
    #!/usr/bin/env bash
    #
    # Idempotent Keycloak bootstrap for the "mock" MCP server.
    # Runs against the official Keycloak image using kcadm.sh (no custom image).
    #
    set -euo pipefail

    KCADM=/opt/keycloak/bin/kcadm.sh
    SERVER="${KC_SERVER_URL:-http://keycloak.mcp-gateway.svc.cluster.local:8080}"
    REALM="mcp"
    IDP_ALIAS="ds-sso"
    SCOPE_NAME="mcp:mock:use"
    AUDIENCE="https://gateway.mcp.aidev.samsungds.net/mock/mcp"
    CLI_CLIENT="mcp-cli"

    echo ">> Waiting for Keycloak admin login at ${SERVER} ..."
    until $KCADM config credentials --server "$SERVER" --realm master \
      --user "$KEYCLOAK_ADMIN" --password "$KEYCLOAK_ADMIN_PASSWORD" >/dev/null 2>&1; do
      echo "   Keycloak not ready yet, retrying in 5s..."
      sleep 5
    done
    echo ">> Logged in."

    ############################################################
    # 1. Realm
    ############################################################
    if $KCADM get "realms/${REALM}" >/dev/null 2>&1; then
      echo ">> Realm '${REALM}' already exists."
    else
      echo ">> Creating realm '${REALM}'."
      $KCADM create realms -s realm="${REALM}" -s enabled=true
    fi

    ############################################################
    # 2. DS SSO identity provider (OIDC broker)
    #    Endpoints are read from the discovery document, fetched by the
    #    fetch-ds-sso-discovery initContainer (the Keycloak image has no
    #    curl). grep/sed are used to avoid a jq dependency.
    ############################################################
    echo ">> Reading DS SSO discovery document..."
    DISC="$(cat /discovery/oidc-discovery.json)"
    field() { echo "$DISC" | grep -o "\"$1\"[[:space:]]*:[[:space:]]*\"[^\"]*\"" | head -1 | sed -E 's/.*:[[:space:]]*"([^"]*)".*/\1/'; }
    ISSUER="$(field issuer)"
    AUTH_URL="$(field authorization_endpoint)"
    TOKEN_URL="$(field token_endpoint)"
    JWKS_URL="$(field jwks_uri)"
    USERINFO_URL="$(field userinfo_endpoint)"
    LOGOUT_URL="$(field end_session_endpoint)"

    if [ -z "$AUTH_URL" ] || [ -z "$TOKEN_URL" ]; then
      echo "!! Failed to parse DS SSO discovery document at /discovery/oidc-discovery.json" >&2
      exit 1
    fi

    if $KCADM get "identity-provider/instances/${IDP_ALIAS}" -r "${REALM}" >/dev/null 2>&1; then
      echo ">> Identity provider '${IDP_ALIAS}' already exists."
    else
      echo ">> Creating identity provider '${IDP_ALIAS}'."
      $KCADM create identity-provider/instances -r "${REALM}" \
        -s alias="${IDP_ALIAS}" \
        -s displayName="DS SSO" \
        -s providerId=oidc \
        -s enabled=true \
        -s trustEmail=true \
        -s storeToken=false \
        -s firstBrokerLoginFlowAlias="first broker login" \
        -s "config.clientId=${DS_SSO_CLIENT_ID}" \
        -s "config.clientSecret=${DS_SSO_CLIENT_SECRET}" \
        -s "config.clientAuthMethod=client_secret_post" \
        -s "config.issuer=${ISSUER}" \
        -s "config.authorizationUrl=${AUTH_URL}" \
        -s "config.tokenUrl=${TOKEN_URL}" \
        -s "config.jwksUrl=${JWKS_URL}" \
        -s "config.userInfoUrl=${USERINFO_URL}" \
        -s "config.logoutUrl=${LOGOUT_URL}" \
        -s "config.useJwksUrl=true" \
        -s "config.validateSignature=true" \
        -s "config.defaultScope=openid profile email" \
        -s "config.syncMode=FORCE"
    fi

    # Map the ADFS "loginid" claim onto the Keycloak user attribute "loginid".
    if $KCADM get "identity-provider/instances/${IDP_ALIAS}/mappers" -r "${REALM}" \
        | grep -q '"name" : "loginid"'; then
      echo ">> IdP mapper 'loginid' already exists."
    else
      echo ">> Creating IdP attribute mapper 'loginid'."
      $KCADM create "identity-provider/instances/${IDP_ALIAS}/mappers" -r "${REALM}" \
        -s name=loginid \
        -s identityProviderAlias="${IDP_ALIAS}" \
        -s identityProviderMapper=oidc-user-attribute-idp-mapper \
        -s 'config."claim"=loginid' \
        -s 'config."user.attribute"=loginid' \
        -s 'config."syncMode"=INHERIT'
    fi

    ############################################################
    # 3. Client scope: mcp:mock:use
    #    - adds audience for the mock resource
    #    - emits the required "loginid" claim
    ############################################################
    SCOPE_ID="$($KCADM get client-scopes -r "${REALM}" \
      --fields id,name --format csv --noquotes 2>/dev/null \
      | awk -F, -v n="${SCOPE_NAME}" '$2==n{print $1}')"

    if [ -n "${SCOPE_ID}" ]; then
      echo ">> Client scope '${SCOPE_NAME}' already exists."
    else
      echo ">> Creating client scope '${SCOPE_NAME}'."
      SCOPE_ID="$($KCADM create client-scopes -r "${REALM}" \
        -s name="${SCOPE_NAME}" \
        -s protocol=openid-connect \
        -s 'attributes."include.in.token.scope"=true' \
        -s 'attributes."display.on.consent.screen"=false' \
        -i)"

      echo ">> Adding audience mapper -> ${AUDIENCE}"
      $KCADM create "client-scopes/${SCOPE_ID}/protocol-mappers/models" -r "${REALM}" \
        -s name=mock-audience \
        -s protocol=openid-connect \
        -s protocolMapper=oidc-audience-mapper \
        -s "config.\"included.custom.audience\"=${AUDIENCE}" \
        -s 'config."access.token.claim"=true' \
        -s 'config."id.token.claim"=false'

      echo ">> Adding loginid claim mapper"
      $KCADM create "client-scopes/${SCOPE_ID}/protocol-mappers/models" -r "${REALM}" \
        -s name=loginid \
        -s protocol=openid-connect \
        -s protocolMapper=oidc-usermodel-attribute-mapper \
        -s 'config."user.attribute"=loginid' \
        -s 'config."claim.name"=loginid' \
        -s 'config."jsonType.label"=String' \
        -s 'config."access.token.claim"=true' \
        -s 'config."id.token.claim"=true' \
        -s 'config."userinfo.token.claim"=true'
    fi

    ############################################################
    # 4. Public client: mcp-cli
    ############################################################
    CLIENT_ID="$($KCADM get clients -r "${REALM}" \
      --query "clientId=${CLI_CLIENT}" --fields id --format csv --noquotes 2>/dev/null | head -1)"

    if [ -n "${CLIENT_ID}" ]; then
      echo ">> Client '${CLI_CLIENT}' already exists."
    else
      echo ">> Creating public client '${CLI_CLIENT}'."
      CLIENT_ID="$($KCADM create clients -r "${REALM}" \
        -s clientId="${CLI_CLIENT}" \
        -s enabled=true \
        -s publicClient=true \
        -s standardFlowEnabled=true \
        -s directAccessGrantsEnabled=false \
        -s 'redirectUris=["http://localhost:*","http://127.0.0.1:*"]' \
        -s 'attributes."pkce.code.challenge.method"=S256' \
        -i)"
    fi

    echo ">> Attaching '${SCOPE_NAME}' as an optional client scope on '${CLI_CLIENT}'."
    $KCADM update "clients/${CLIENT_ID}/optional-client-scopes/${SCOPE_ID}" -r "${REALM}" || true

    echo ">> Bootstrap complete."
