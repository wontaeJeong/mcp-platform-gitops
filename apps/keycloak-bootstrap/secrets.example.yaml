# EXAMPLE ONLY - do NOT commit real values.
# These Secrets are consumed by the bootstrap Job and Keycloak.
# Create them with the kubectl commands documented in the README instead of
# applying this file. This file exists only to document the expected shape.
---
apiVersion: v1
kind: Secret
metadata:
  name: keycloak-admin
  namespace: mcp-gateway
type: Opaque
stringData:
  username: admin
  password: "<KEYCLOAK_ADMIN_PASSWORD>"
---
apiVersion: v1
kind: Secret
metadata:
  name: keycloak-db
  namespace: mcp-gateway
type: kubernetes.io/basic-auth
stringData:
  username: keycloak
  password: "<KEYCLOAK_DB_PASSWORD>"
  database: keycloak
---
apiVersion: v1
kind: Secret
metadata:
  name: ds-sso-oidc
  namespace: mcp-gateway
type: Opaque
stringData:
  discovery-url: "https://stsds.secsso.net/adfs/.well-known/openid-configuration"
  client-id: "<DS_SSO_CLIENT_ID>"
  client-secret: "<DS_SSO_CLIENT_SECRET>"
