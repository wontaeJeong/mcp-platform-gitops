# One-shot bootstrap Job. Uses the official Keycloak image + kcadm.sh.
# Idempotent: safe to re-run. See README for how to re-trigger.
apiVersion: batch/v1
kind: Job
metadata:
  name: keycloak-bootstrap
  annotations:
    argocd.argoproj.io/sync-wave: "30"
    # Re-run automatically after each successful ArgoCD sync of this app.
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 10
  ttlSecondsAfterFinished: 86400
  activeDeadlineSeconds: 600
  template:
    metadata:
      labels:
        app: keycloak-bootstrap
    spec:
      restartPolicy: Never
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      # The official Keycloak image has no curl/package manager (hardened
      # UBI-micro base). Fetch the DS SSO discovery doc in a small curl
      # initContainer and hand it to kcadm as a file instead.
      initContainers:
        - name: fetch-ds-sso-discovery
          image: curlimages/curl:8.11.1
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          command:
            - sh
            - -c
            - |
              set -eu
              for i in $(seq 1 10); do
                if curl --fail --silent --show-error --cacert /etc/corporate-ca/ca.crt \
                  --output /discovery/oidc-discovery.json "$DS_SSO_DISCOVERY_URL"; then
                  exit 0
                fi
                echo "retry $i/10 fetching DS SSO discovery doc..."
                sleep 5
              done
              echo "failed to fetch DS SSO discovery doc from $DS_SSO_DISCOVERY_URL" >&2
              exit 1
          env:
            - name: DS_SSO_DISCOVERY_URL
              valueFrom:
                secretKeyRef:
                  name: ds-sso-oidc
                  key: discovery-url
          volumeMounts:
            - name: discovery-doc
              mountPath: /discovery
            - name: corporate-ca
              mountPath: /etc/corporate-ca
              readOnly: true
      containers:
        - name: kcadm
          image: quay.io/keycloak/keycloak:26.0
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          command: ["/bin/bash", "/scripts/bootstrap.sh"]
          env:
            - name: KC_SERVER_URL
              value: "http://keycloak.mcp-gateway.svc.cluster.local:8080"
            - name: KEYCLOAK_ADMIN
              valueFrom:
                secretKeyRef:
                  name: keycloak-admin
                  key: username
            - name: KEYCLOAK_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: keycloak-admin
                  key: password
            - name: DS_SSO_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: ds-sso-oidc
                  key: client-id
            - name: DS_SSO_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: ds-sso-oidc
                  key: client-secret
          volumeMounts:
            - name: bootstrap-script
              mountPath: /scripts
            - name: discovery-doc
              mountPath: /discovery
              readOnly: true
      volumes:
        - name: bootstrap-script
          configMap:
            name: keycloak-bootstrap-script
            defaultMode: 0755
        - name: discovery-doc
          emptyDir: {}
        - name: corporate-ca
          secret:
            secretName: corporate-ca
            items:
              - key: ca.crt
                path: ca.crt
