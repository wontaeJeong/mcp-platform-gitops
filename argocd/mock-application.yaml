# mock-mcp-server (ClusterIP only, no Ingress). Sync-wave 50 (last).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mock-mcp-server
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "50"
spec:
  project: default
  source:
    repoURL: https://github.com/wontaeJeong/mcp-platform-gitops.git
    targetRevision: main
    path: apps/mock-mcp-server
  destination:
    server: https://kubernetes.default.svc
    namespace: mcp-gateway
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
