# App-of-apps root. Manages three fixed platform Applications plus the MCP
# server ApplicationSet in argocd/. Wave 50 orders ApplicationSet resource
# creation only; it does not wait for generated Application health/readiness.
# Apply this one Application to deploy everything:
#   kubectl apply -f argocd/root-application.yaml
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mcp-platform-root
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/wontaeJeong/mcp-platform-gitops.git
    targetRevision: main
    path: argocd
    directory:
      recurse: false
      # Directory contains three fixed Application manifests and the MCP server ApplicationSet; exclude only this root manifest.
      exclude: root-application.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
