server:
  listen_addr: ":8080"

auth:
  issuer: "http://keycloak.localhost:8081/realms/mcp"
  discovery_url: "http://keycloak.localhost:8081/realms/mcp/.well-known/openid-configuration"
  loginid_claim: "loginid"
  groups_claim: "groups"
  username_claim: "preferred_username"
  email_claim: "email"
  jwks_cache_ttl: "10m"

internal_identity:
  issuer: "mcp-auth-gateway"
  ttl: "60s"
  signing_alg: "HS256"
  secret_env: "MCP_INTERNAL_JWT_SECRET"

servers:
  - name: "mock"
    external_path_prefix: "/mock"
    mcp_path: "/mcp"
    public_resource: "http://gateway.localhost:8080/mock/mcp"
    audience: "http://gateway.localhost:8080/mock/mcp"
    backend_url: "http://mock:8080"
    backend_identity_audience: "mock-mcp-server"
    strip_external_path_prefix: true
    required_scopes:
      - "mcp:mock:use"
    allowed_origins:
      - "http://gateway.localhost:8080"
      - "http://localhost:6274"
    allowed_groups: []
